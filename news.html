<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News &amp; Guides — PhoneHub</title>
  <meta name="description" content="Latest phone news, buying guides and comparisons.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">Phone<span>Hub</span></a>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="search.html">All Phones</a>
        <a href="brands.html">Brands</a>
        <a href="compare.html">Compare</a>
        <a href="news.html" class="active">News</a>
      </nav>
      <form class="search-form" id="searchForm">
        <input type="text" placeholder="Search phones..." aria-label="Search phones">
        <button type="submit">Search</button>
      </form>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">☰</button>
    </div>
  </header>

  <main class="container">
    <p class="crumb"><a href="index.html">Home</a> / News</p>
    <h1 style="margin:14px 0">News &amp; guides</h1>
    <div class="news-grid" id="newsGrid"></div>
    <div class="ad-slot">Advertisement <small>responsive display unit</small></div>
  </main>

  <footer class="site-footer">
    <div class="container"><div class="footer-bottom">© <span id="year"></span> PhoneHub. Sample data for demo purposes.</div></div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script>
    document.getElementById("newsGrid").innerHTML = (window.NEWS || []).map(function (n) {
      return '<article class="news-card"><span class="tag">' + n.tag + '</span>' +
             '<h3>' + n.title + '</h3><p>' + n.excerpt + '</p>' +
             '<span class="date">' + new Date(n.date).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" }) + '</span></article>';
    }).join("");
    var y = document.getElementById("year"); if (y) y.textContent = new Date().getFullYear();
  </script>
</body>
</html>
