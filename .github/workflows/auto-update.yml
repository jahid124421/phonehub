name: PhoneHub Auto Update & Deploy

on:
  push:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limit products to process (default: 100)'
        required: false
        default: '100'

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Run Enhanced Pipeline
      env:
        SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        RAINFOREST_API_KEY: ${{ secrets.RAINFOREST_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
      run: |
        cd tools
        
        # Create config with secrets
        cat > config.json << EOF
        {
          "site_url": "https://jahid124421.github.io/phonehub",
          "scraperapi_key": "$SCRAPERAPI_KEY",
          "rainforest_api_key": "$RAINFOREST_API_KEY",
          "pexels_api_key": "$PEXELS_API_KEY",
          "pixabay_api_key": "$PIXABAY_API_KEY",
          "newsapi_key": "$NEWSAPI_KEY",
          "brands": ["apple", "samsung", "google", "xiaomi", "oneplus", "nothing", "vivo", "realme", "oppo", "motorola", "sony", "nokia", "honor", "asus", "huawei", "lg", "tcl", "zte", "lenovo"],
          "max_phones_per_brand": 20,
          "scrape_delay": 2,
          "scrape_brand_delay": 4,
          "llm": {
            "provider": "openrouter",
            "model": "meta-llama/llama-3.3-70b-instruct",
            "keys_env_path": "../../ai-bots-package/my-keys.env"
          },
          "affiliate": {
            "amazon_partner_tag": "",
            "amazon_marketplace": "www.amazon.com"
          },
          "stores": ["Amazon", "Flipkart"]
        }
        EOF
        
        # Seed catalog from Wikidata (fast, free, unlimited)
        echo "=== Seeding from Wikidata ==="
        python wikidata_seed.py --all || true
        
        # Fetch brand logos
        echo "=== Fetching brand logos ==="
        python -c "
import json, os, urllib.request
brands_data = []
for b in ['apple','samsung','google','xiaomi','oneplus','nothing','vivo','realme','oppo','motorola','sony','nokia','honor','asus','huawei','lg','tcl','zte','lenovo']:
    brands_data.append({'id':b,'name':b.title(),'logo':f'https://cdn.brandfetch.io/{b}.com','color':'#666666','category':'Premium','emoji':'📱'})
os.makedirs('data', exist_ok=True)
with open('data/brands.json', 'w') as f: json.dump({'brands': brands_data}, f)
print('✓ Brand logos ready')
        " || true
        
        # Fetch prices (limit to avoid quota)
        echo "=== Fetching prices ==="
        python price_job.py || true
        
        # Generate AI content (limit to save tokens)
        echo "=== Generating AI content ==="
        python content_agent.py --limit ${{ github.event.inputs.limit || 50 }} || true
        
        # Fetch news with images
        echo "=== Fetching news ==="
        python news_fetch.py || true
        
        # Build everything
        echo "=== Building site ==="
        python build.py || true
    
    - name: Commit and Push Changes
      run: |
        git config --global user.name "PhoneHub Bot"
        git config --global user.email "bot@phonehub.com"
        
        git add -A
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "auto: refresh phone data $(date +'%Y-%m-%d %H:%M')"
          git push origin main
        fi
    
    - name: Trigger Cloudflare Pages Deploy
      run: |
        echo "✓ Changes pushed - Cloudflare Pages will auto-deploy"
        echo "View deployment at: https://dash.cloudflare.com"
