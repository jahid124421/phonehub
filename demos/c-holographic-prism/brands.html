<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Brands - PhoneHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
@property --angle {syntax:'<angle>';initial-value:0deg;inherits:false}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--bg2:#0f1424;--bg3:#151b30;--cyan:#06b6d4;--purple:#8b5cf6;--pink:#ec4899;--text:#e2e8f0;--text2:#94a3b8;--grad:linear-gradient(135deg,#06b6d4,#8b5cf6,#ec4899)}
html{scroll-behavior:smooth}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{animation:none!important;transition:none!important}}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.6}
a{color:inherit;text-decoration:none}
.gradient-text{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.holo-card{position:relative;background:var(--bg2);border:2px solid transparent;border-image:conic-gradient(from var(--angle),#06b6d4,#8b5cf6,#ec4899,#06b6d4) 1;animation:spin-border 4s linear infinite;transition:all .3s}
.holo-card:hover{animation-duration:1.5s;transform:translateY(-4px);box-shadow:0 0 30px rgba(139,92,246,.2)}
@keyframes spin-border{to{--angle:360deg}}
.chromatic{text-shadow:-1px 0 rgba(255,0,255,.3),1px 0 rgba(0,255,255,.3)}

.header{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(139,92,246,.2);padding:0 2rem}
.header-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-size:1.5rem;font-weight:800}
.nav{display:flex;gap:2rem;list-style:none}
.nav a{font-weight:500;font-size:.9rem;color:var(--text2);transition:color .3s;position:relative}
.nav a:hover,.nav a.active{color:#06b6d4}
.nav a.active::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:2px;background:var(--grad);border-radius:2px}
.menu-toggle{display:none;background:none;border:none;color:var(--text);font-size:1.5rem;cursor:pointer}

.page-hero{padding:4rem 2rem 2rem;text-align:center}
.page-hero h1{font-size:2.5rem;font-weight:900;margin-bottom:.5rem}
.page-hero p{color:var(--text2);font-size:1rem}

/* Category Tabs */
.cat-tabs{display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center;padding:1.5rem 2rem;max-width:1280px;margin:0 auto}
.cat-tab{padding:.55rem 1.4rem;border:1px solid transparent;border-image:linear-gradient(135deg,#06b6d4,#8b5cf6,#ec4899) 1;background:var(--bg2);font-size:.85rem;font-weight:600;color:var(--text2);cursor:pointer;transition:all .3s;font-family:inherit}
.cat-tab.active,.cat-tab:hover{background:var(--grad);color:#fff;border-image:none}

.section{padding:2rem;max-width:1280px;margin:0 auto}
.section h2{font-size:1.4rem;font-weight:700;margin-bottom:1.5rem}

.brand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;margin-bottom:3rem}
.brand-tile{padding:1.5rem 1rem;border-radius:10px;text-align:center;cursor:pointer;transition:all .3s;opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s}
.brand-tile.visible{opacity:1;transform:translateY(0)}
.brand-tile:hover{box-shadow:0 0 25px rgba(6,182,212,.15)}
.brand-tile .brand-name{font-weight:700;font-size:.95rem;margin-bottom:4px}
.brand-tile .brand-count{font-size:.8rem;color:var(--text2)}

.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;width:4px;height:4px;border-radius:50%;background:linear-gradient(135deg,#06b6d4,#8b5cf6,#ec4899);animation:float-up linear infinite;opacity:.6}
@keyframes float-up{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.6}90%{opacity:.6}100%{transform:translateY(-10vh) scale(1);opacity:0}}

.footer{border-top:1px solid rgba(139,92,246,.2);padding:2rem;text-align:center;margin-top:2rem}
.footer-links{display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;margin-bottom:1rem}
.footer-links a{color:var(--text2);font-size:.85rem}
.footer-links a:hover{color:#06b6d4}
.footer p{color:var(--text2);font-size:.8rem}

@media(max-width:768px){
  .nav{display:none;position:absolute;top:64px;left:0;right:0;background:rgba(10,14,26,.98);flex-direction:column;padding:1.5rem;gap:1rem;border-bottom:1px solid rgba(139,92,246,.2)}
  .nav.open{display:flex}
  .menu-toggle{display:block}
  .brand-grid{grid-template-columns:repeat(2,1fr)}
  .page-hero h1{font-size:1.8rem}
}
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo gradient-text">PhoneHub</a>
    <button class="menu-toggle" onclick="document.querySelector('.nav').classList.toggle('open')">☰</button>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="search.html">Devices</a>
      <a href="compare.html">Compare</a>
      <a href="brands.html" class="active">Brands</a>
      <a href="news.html">News</a>
    </nav>
  </div>
</header>

<div class="page-hero">
  <h1 class="gradient-text">All Brands</h1>
  <p>Explore 500+ brands across every category</p>
</div>

<div class="cat-tabs">
  <button class="cat-tab active" data-cat="all">All</button>
  <button class="cat-tab" data-cat="mobiles">📱 Mobiles</button>
  <button class="cat-tab" data-cat="auto">🚗 Auto</button>
  <button class="cat-tab" data-cat="laptops">💻 Laptops</button>
  <button class="cat-tab" data-cat="tvs">📺 TVs</button>
</div>

<section class="section" id="mobilesSection">
  <h2 class="chromatic">📱 Mobiles <span style="color:var(--text2);font-weight:400;font-size:.9rem">(32 brands)</span></h2>
  <div class="brand-grid" id="mobilesGrid"></div>
</section>

<section class="section" id="autoSection">
  <h2 class="chromatic">🚗 Auto <span style="color:var(--text2);font-weight:400;font-size:.9rem">(128 brands)</span></h2>
  <div class="brand-grid" id="autoGrid"></div>
</section>

<section class="section" id="laptopsSection">
  <h2 class="chromatic">💻 Laptops <span style="color:var(--text2);font-weight:400;font-size:.9rem">(8 brands)</span></h2>
  <div class="brand-grid" id="laptopsGrid"></div>
</section>

<section class="section" id="tvsSection">
  <h2 class="chromatic">📺 TVs <span style="color:var(--text2);font-weight:400;font-size:.9rem">(5 brands)</span></h2>
  <div class="brand-grid" id="tvsGrid"></div>
</section>

<footer class="footer">
  <div class="footer-links">
    <a href="index.html">Home</a><a href="search.html">Devices</a><a href="compare.html">Compare</a><a href="brands.html">Brands</a><a href="news.html">News</a>
  </div>
  <p>© 2026 PhoneHub. All rights reserved.</p>
</footer>

<script>
const brandData={
mobiles:['Apple','Samsung','Google','OnePlus','Xiaomi','Huawei','Oppo','Vivo','Realme','Nothing','Motorola','Nokia','Sony','Asus','ZTE','Tecno','Infinix','Honor'],
auto:['Tesla','BMW','Mercedes','Audi','Porsche','Rivian','Lucid','BYD','NIO','Hyundai','Kia','Ford','Chevrolet','Volkswagen','Toyota','Honda'],
laptops:['Apple','Dell','Lenovo','HP','Asus','Acer','MSI','Razer'],
tvs:['Sony','LG','Samsung','TCL','Hisense']
};

function renderBrands(arr,gridId){
const g=document.getElementById(gridId);
arr.forEach((b,i)=>{
const count=Math.floor(Math.random()*40)+5;
g.innerHTML+=`<a href="search.html" class="brand-tile holo-card" style="animation-delay:${i*.05}s"><div class="brand-name">${b}</div><div class="brand-count">${count} products</div></a>`;
});
}

renderBrands(brandData.mobiles,'mobilesGrid');
renderBrands(brandData.auto,'autoGrid');
renderBrands(brandData.laptops,'laptopsGrid');
renderBrands(brandData.tvs,'tvsGrid');

// Particles
const pc=document.getElementById('particles');
for(let i=0;i<20;i++){const d=document.createElement('div');d.className='particle';d.style.left=Math.random()*100+'%';d.style.animationDuration=(6+Math.random()*8)+'s';d.style.animationDelay=Math.random()*6+'s';d.style.width=d.style.height=(2+Math.random()*4)+'px';pc.appendChild(d)}

// Observer
const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')})},{threshold:.1});
document.querySelectorAll('.brand-tile').forEach(el=>obs.observe(el));

// Category tabs
document.querySelectorAll('.cat-tab').forEach(tab=>{
tab.addEventListener('click',()=>{
document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
tab.classList.add('active');
const cat=tab.dataset.cat;
const sections=document.querySelectorAll('.section');
sections.forEach(s=>s.style.display=(cat==='all'||s.id===cat+'Section')?'block':'none');
});
});
</script>
</body>
</html>
