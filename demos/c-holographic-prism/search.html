<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devices - PhoneHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
@property --angle {syntax:'<angle>';initial-value:0deg;inherits:false}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--bg2:#0f1424;--bg3:#151b30;--cyan:#06b6d4;--purple:#8b5cf6;--pink:#ec4899;--text:#e2e8f0;--text2:#94a3b8;--grad:linear-gradient(135deg,#06b6d4,#8b5cf6,#ec4899)}
html{scroll-behavior:smooth}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{animation:none!important;transition:none!important}}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.6}
a{color:inherit;text-decoration:none}
.gradient-text{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.holo-card{position:relative;background:var(--bg2);border:2px solid transparent;border-image:conic-gradient(from var(--angle),#06b6d4,#8b5cf6,#ec4899,#06b6d4) 1;animation:spin-border 4s linear infinite;transition:all .3s}
.holo-card:hover{animation-duration:1.5s;transform:translateY(-4px);box-shadow:0 0 30px rgba(139,92,246,.2)}
@keyframes spin-border{to{--angle:360deg}}
.chromatic{text-shadow:-1px 0 rgba(255,0,255,.3),1px 0 rgba(0,255,255,.3)}

.header{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(139,92,246,.2);padding:0 2rem}
.header-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-size:1.5rem;font-weight:800}
.nav{display:flex;gap:2rem;list-style:none}
.nav a{font-weight:500;font-size:.9rem;color:var(--text2);transition:color .3s;position:relative}
.nav a:hover,.nav a.active{color:#06b6d4}
.nav a.active::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:2px;background:var(--grad);border-radius:2px}
.menu-toggle{display:none;background:none;border:none;color:var(--text);font-size:1.5rem;cursor:pointer}

.page-title{padding:3rem 2rem 1rem;text-align:center}
.page-title h1{font-size:2.2rem;font-weight:800}

.main-layout{max-width:1280px;margin:0 auto;padding:1.5rem 2rem;display:grid;grid-template-columns:260px 1fr;gap:2rem}

/* Sidebar */
.sidebar{position:sticky;top:80px;align-self:start}
.filter-group{margin-bottom:1.5rem}
.filter-group h3{font-size:.9rem;font-weight:700;margin-bottom:.75rem;color:var(--cyan)}
.accordion{border:1px solid rgba(139,92,246,.2);border-radius:8px;overflow:hidden;margin-bottom:.5rem;background:var(--bg2)}
.accordion-header{padding:.75rem 1rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:.85rem;font-weight:600;transition:background .3s}
.accordion-header:hover{background:rgba(139,92,246,.1)}
.accordion-header .arrow{transition:transform .3s;font-size:.7rem}
.accordion.open .arrow{transform:rotate(180deg)}
.accordion-body{max-height:0;overflow:hidden;transition:max-height .3s}
.accordion.open .accordion-body{max-height:300px}
.accordion-body label{display:flex;align-items:center;gap:.5rem;padding:.4rem 1rem;font-size:.82rem;color:var(--text2);cursor:pointer}
.accordion-body label:hover{color:var(--text)}
.accordion-body input[type="checkbox"]{accent-color:var(--purple)}

.price-slider{padding:.5rem 0}
.price-slider input[type="range"]{width:100%;accent-color:var(--purple);background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink));height:4px;border-radius:2px;-webkit-appearance:none;appearance:none}
.price-slider input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--grad);cursor:pointer;border:2px solid var(--bg)}
.price-labels{display:flex;justify-content:space-between;font-size:.8rem;color:var(--text2);margin-top:4px}

.rating-toggle{display:flex;gap:.5rem;flex-wrap:wrap}
.rating-btn{padding:.3rem .7rem;font-size:.8rem;border:1px solid rgba(139,92,246,.3);border-radius:20px;background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .3s;font-family:inherit}
.rating-btn.active,.rating-btn:hover{background:var(--grad);color:#fff;border-color:transparent}

/* Chips */
.active-filters{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem;grid-column:1/-1}
.chip{display:inline-flex;align-items:center;gap:.4rem;padding:.35rem .8rem;font-size:.8rem;border:1px solid transparent;border-image:linear-gradient(135deg,#06b6d4,#ec4899) 1;background:var(--bg2);color:var(--text);cursor:pointer;transition:all .3s}
.chip:hover{background:rgba(236,72,153,.1)}
.chip .x{font-size:.7rem;opacity:.6}

/* Sort bar */
.sort-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.sort-bar span{font-size:.85rem;color:var(--text2)}
.sort-bar select{padding:.4rem .8rem;background:var(--bg3);border:1px solid rgba(139,92,246,.3);border-radius:6px;color:var(--text);font-family:inherit;font-size:.85rem;cursor:pointer}

/* Product Grid */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.5rem}
.product-card{padding:1.5rem;border-radius:12px;opacity:0;transform:translateY(30px);transition:opacity .6s,transform .6s}
.product-card.visible{opacity:1;transform:translateY(0)}
.product-card .img-placeholder{width:100%;height:140px;background:linear-gradient(135deg,rgba(6,182,212,.1),rgba(139,92,246,.1));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;margin-bottom:1rem}
.product-card h3{font-size:.95rem;font-weight:700;margin-bottom:.4rem}
.product-card .brand{font-size:.8rem;color:var(--text2);margin-bottom:.5rem}
.product-card .meta{display:flex;justify-content:space-between;align-items:center}
.product-card .price{font-size:1.05rem;font-weight:700;color:#8b5cf6}
.product-card .rating{display:flex;align-items:center;gap:4px;color:#06b6d4;font-weight:600;font-size:.85rem}
.star{color:#06b6d4}

.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;width:4px;height:4px;border-radius:50%;background:linear-gradient(135deg,#06b6d4,#8b5cf6,#ec4899);animation:float-up linear infinite;opacity:.6}
@keyframes float-up{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.6}90%{opacity:.6}100%{transform:translateY(-10vh) scale(1);opacity:0}}

.footer{border-top:1px solid rgba(139,92,246,.2);padding:2rem 2rem;text-align:center;margin-top:3rem}
.footer p{color:var(--text2);font-size:.8rem}

@media(max-width:768px){
  .nav{display:none;position:absolute;top:64px;left:0;right:0;background:rgba(10,14,26,.98);flex-direction:column;padding:1.5rem;gap:1rem;border-bottom:1px solid rgba(139,92,246,.2)}
  .nav.open{display:flex}
  .menu-toggle{display:block}
  .main-layout{grid-template-columns:1fr}
  .sidebar{position:static}
  .product-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo gradient-text">PhoneHub</a>
    <button class="menu-toggle" onclick="document.querySelector('.nav').classList.toggle('open')">☰</button>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="search.html" class="active">Devices</a>
      <a href="compare.html">Compare</a>
      <a href="brands.html">Brands</a>
      <a href="news.html">News</a>
    </nav>
  </div>
</header>

<div class="page-title"><h1 class="gradient-text">All Devices</h1></div>

<div class="main-layout">
  <aside class="sidebar">
    <div class="filter-group">
      <h3>Brands by Category</h3>
      <div class="accordion open">
        <div class="accordion-header" onclick="this.parentElement.classList.toggle('open')">📱 Mobiles <span class="arrow">▼</span></div>
        <div class="accordion-body">
          <label><input type="checkbox" checked> Apple</label>
          <label><input type="checkbox" checked> Samsung</label>
          <label><input type="checkbox" checked> Google</label>
          <label><input type="checkbox" checked> OnePlus</label>
          <label><input type="checkbox" checked> Xiaomi</label>
        </div>
      </div>
      <div class="accordion">
        <div class="accordion-header" onclick="this.parentElement.classList.toggle('open')">🚗 Auto <span class="arrow">▼</span></div>
        <div class="accordion-body">
          <label><input type="checkbox"> Tesla</label>
          <label><input type="checkbox"> BMW</label>
        </div>
      </div>
      <div class="accordion">
        <div class="accordion-header" onclick="this.parentElement.classList.toggle('open')">💻 Laptops <span class="arrow">▼</span></div>
        <div class="accordion-body">
          <label><input type="checkbox"> Apple</label>
          <label><input type="checkbox"> Dell</label>
        </div>
      </div>
      <div class="accordion">
        <div class="accordion-header" onclick="this.parentElement.classList.toggle('open')">📺 TVs <span class="arrow">▼</span></div>
        <div class="accordion-body">
          <label><input type="checkbox"> Sony</label>
          <label><input type="checkbox"> LG</label>
        </div>
      </div>
    </div>

    <div class="filter-group">
      <h3>Price Range</h3>
      <div class="price-slider">
        <input type="range" min="0" max="60000" value="60000" id="priceRange" oninput="document.getElementById('priceMax').textContent='$'+Number(this.value).toLocaleString()">
        <div class="price-labels"><span>$0</span><span id="priceMax">$60,000</span></div>
      </div>
    </div>

    <div class="filter-group">
      <h3>Minimum Rating</h3>
      <div class="rating-toggle">
        <button class="rating-btn active">All</button>
        <button class="rating-btn">4.0+</button>
        <button class="rating-btn">4.5+</button>
        <button class="rating-btn">4.8+</button>
      </div>
    </div>

    <div class="filter-group">
      <h3>Featured</h3>
      <label style="display:flex;align-items:center;gap:.5rem;font-size:.85rem;color:var(--text2);cursor:pointer;margin-bottom:.4rem"><input type="checkbox" style="accent-color:var(--purple)"> Editor's Choice</label>
      <label style="display:flex;align-items:center;gap:.5rem;font-size:.85rem;color:var(--text2);cursor:pointer"><input type="checkbox" style="accent-color:var(--purple)"> Best Value</label>
    </div>
  </aside>

  <main>
    <div class="active-filters">
      <span class="chip">Apple <span class="x">✕</span></span>
      <span class="chip">Samsung <span class="x">✕</span></span>
      <span class="chip">All Mobiles <span class="x">✕</span></span>
    </div>
    <div class="sort-bar">
      <span>Showing 12 products</span>
      <select>
        <option>Sort: Popularity</option>
        <option>Price: Low to High</option>
        <option>Price: High to Low</option>
        <option>Rating</option>
        <option>Newest</option>
      </select>
    </div>
    <div class="product-grid" id="productGrid"></div>
  </main>
</div>

<footer class="footer">
  <p>© 2026 PhoneHub. All rights reserved.</p>
</footer>

<script>
const products=[
{name:'iPhone 16 Pro Max',brand:'Apple',price:'$1,199',rating:4.8,cat:'Mobiles',icon:'📱',link:'product.html'},
{name:'Galaxy S25 Ultra',brand:'Samsung',price:'$1,299',rating:4.7,cat:'Mobiles',icon:'📱',link:'#'},
{name:'OnePlus 13',brand:'OnePlus',price:'$899',rating:4.5,cat:'Mobiles',icon:'📱',link:'#'},
{name:'Tesla Model Y',brand:'Tesla',price:'$44,990',rating:4.6,cat:'Auto',icon:'🚗',link:'#'},
{name:'MacBook Pro M4',brand:'Apple',price:'$2,399',rating:4.9,cat:'Laptops',icon:'💻',link:'#'},
{name:'Sony Bravia XR',brand:'Sony',price:'$1,499',rating:4.4,cat:'TVs',icon:'📺',link:'#'},
{name:'Pixel 9 Pro',brand:'Google',price:'$999',rating:4.6,cat:'Mobiles',icon:'📱',link:'#'},
{name:'Xiaomi 15 Ultra',brand:'Xiaomi',price:'$799',rating:4.3,cat:'Mobiles',icon:'📱',link:'#'},
{name:'Dell XPS 16',brand:'Dell',price:'$1,899',rating:4.5,cat:'Laptops',icon:'💻',link:'#'},
{name:'BMW i4',brand:'BMW',price:'$55,900',rating:4.7,cat:'Auto',icon:'🚗',link:'#'},
{name:'LG C4 OLED',brand:'LG',price:'$1,299',rating:4.6,cat:'TVs',icon:'📺',link:'#'},
{name:'Galaxy Tab S10',brand:'Samsung',price:'$849',rating:4.4,cat:'Tablets',icon:'📱',link:'#'}
];

const pg=document.getElementById('productGrid');
products.forEach((p,i)=>{
pg.innerHTML+=`<a href="${p.link}" class="product-card holo-card" style="animation-delay:${i*.1}s"><div class="img-placeholder">${p.icon}</div><h3 class="chromatic">${p.name}</h3><p class="brand">${p.brand} · ${p.cat}</p><div class="meta"><span class="price">${p.price}</span><span class="rating"><span class="star">★</span> ${p.rating}</span></div></a>`;
});

// Particles
const pc=document.getElementById('particles');
for(let i=0;i<20;i++){const d=document.createElement('div');d.className='particle';d.style.left=Math.random()*100+'%';d.style.animationDuration=(6+Math.random()*8)+'s';d.style.animationDelay=Math.random()*6+'s';d.style.width=d.style.height=(2+Math.random()*4)+'px';pc.appendChild(d)}

// Observer
const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')})},{threshold:.1});
document.querySelectorAll('.product-card').forEach(el=>obs.observe(el));

// Rating buttons
document.querySelectorAll('.rating-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.rating-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active')})});
</script>
</body>
</html>
