<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brands — PhoneHub</title>
  <meta name="description" content="Browse phones by brand.">
  <script>(function(){try{var t=localStorage.getItem("ph_theme")||((window.matchMedia&&matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark");document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">Phone<span>Hub</span></a>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="search.html">All Phones</a>
        <a href="brands.html" class="active">Brands</a>
        <a href="compare.html">Compare</a>
        <a href="news.html">News</a>
      </nav>
      <form class="search-form" id="searchForm">
        <input type="text" placeholder="Search phones..." aria-label="Search phones">
        <button type="submit">Search</button>
      </form>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">☰</button>
    </div>
  </header>

  <main class="container">
    <p class="crumb"><a href="index.html">Home</a> / Brands</p>
    <h1 style="margin:14px 0">All brands</h1>
    <div class="brands-grid" id="brandsGrid"></div>
    <div class="ad-slot">Advertisement <small>responsive display unit</small></div>
  </main>

  <footer class="site-footer">
    <div class="container"><div class="footer-bottom">© <span id="year"></span> PhoneHub. Sample data for demo purposes.</div></div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script>
    document.getElementById("brandsGrid").innerHTML = (window.BRANDS || []).map(function (b) {
      var count = PH.getPhones().filter(function (p) { return p.brand === b.id; }).length;
      return '<a class="brand-tile" href="search.html?brand=' + b.id + '">' +
             '<span class="b-logo">' + b.logo + '</span>' + b.name +
             '<div style="color:var(--muted);font-size:12px;margin-top:4px">' + count + ' phones</div></a>';
    }).join("");
    var y = document.getElementById("year"); if (y) y.textContent = new Date().getFullYear();
  </script>
</body>
</html>
