<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brands — PhoneHub</title>
  <meta name="description" content="Browse phones by brand.">
  <script>(function(){try{var t=localStorage.getItem("ph_theme")||((window.matchMedia&&matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark");document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script>
  <link rel="icon" href="favicon.svg" type="image/svg+xml"><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#5b8cff">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">Phone<span>Hub</span></a>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="search.html">All Phones</a>
        <a href="brands.html" class="active">Brands</a>
        <a href="compare.html">Compare</a>
        <a href="news.html">News</a>
      </nav>
      <form class="search-form" id="searchForm">
        <input type="text" placeholder="Search phones..." aria-label="Search phones">
        <button type="submit">Search</button>
      </form>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">☰</button>
    </div>
  </header>

  <main class="container">
    <p class="crumb"><a href="index.html">Home</a> / Brands</p>
    <h1 style="margin:14px 0">All brands</h1>
    <div class="brands-grid" id="brandsGrid"></div>
  </main>

  <footer class="site-footer">
    <div class="container"><div class="footer-bottom">© <span id="year"></span> PhoneHub. Sample data for demo purposes.</div></div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script>
    // Group brands by category
    const brandsByCategory = {};
    const categoryOrder = ["Premium", "Gaming", "Mid-Range", "Value", "Budget", "Other"];
    
    (window.BRANDS || []).forEach((b) => {
      const cat = b.category || "Other";
      if (!brandsByCategory[cat]) brandsByCategory[cat] = [];
      brandsByCategory[cat].push(b);
    });
    
    let brandsHTML = "";
    categoryOrder.forEach((category) => {
      const brands = brandsByCategory[category];
      if (!brands || brands.length === 0) return;
      
      brandsHTML += '<div class="brand-category"><h3 class="category-title">' + category + '</h3><div class="category-brands">';
      
      brands.forEach((b) => {
        var count = PH.getPhones().filter(function (p) { return p.brand === b.id; }).length;
        brandsHTML += '<a class="brand-tile" href="search.html?brand=' + b.id + '">' +
               PH.brandBadge(b.id, b.name, true) + '<div>' + b.name + '</div>' +
               '<div style="color:var(--muted);font-size:12px;margin-top:4px">' + count + ' phones</div></a>';
      });
      
      brandsHTML += '</div></div>';
    });
    
    document.getElementById("brandsGrid").innerHTML = brandsHTML;
    var y = document.getElementById("year"); if (y) y.textContent = new Date().getFullYear();
  </script>
</body>
</html>
