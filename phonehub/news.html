<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News &amp; Guides — PhoneHub</title>
  <meta name="description" content="Latest phone news, buying guides and comparisons.">
  <script>(function(){try{var t=localStorage.getItem("ph_theme")||((window.matchMedia&&matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark");document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script>
  <link rel="icon" href="favicon.svg" type="image/svg+xml"><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#5b8cff">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">Phone<span>Hub</span></a>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="search.html">All Phones</a>
        <a href="brands.html">Brands</a>
        <a href="compare.html">Compare</a>
        <a href="news.html" class="active">News</a>
      </nav>
      <form class="search-form" id="searchForm">
        <input type="text" placeholder="Search phones..." aria-label="Search phones">
        <button type="submit">Search</button>
      </form>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">☰</button>
    </div>
  </header>

  <main class="container">
    <p class="crumb"><a href="index.html">Home</a> / News</p>
    <h1 style="margin:14px 0 4px">Latest tech news</h1>
    <p style="color:var(--muted);margin-top:0">Fresh phone, laptop &amp; gadget news, refreshed daily from across the web.</p>
    <div class="news-filters" id="newsFilters"></div>
    <div class="news-grid" id="newsGrid"></div>
  </main>

  <footer class="site-footer">
    <div class="container"><div class="footer-bottom">© <span id="year"></span> PhoneHub. Sample data for demo purposes.</div></div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script>
    (function () {
      var all = window.NEWS || [];
      var grid = document.getElementById("newsGrid");
      var cats = ["All"].concat(Array.from(new Set(all.map(function (n) { return n.tag || "News"; }))));
      var active = "All";
      function render() {
        var list = active === "All" ? all : all.filter(function (n) { return (n.tag || "News") === active; });
        grid.innerHTML = list.length ? list.map(PH.newsCard).join("")
          : '<div class="empty">No news in this category yet.</div>';
      }
      document.getElementById("newsFilters").innerHTML = cats.map(function (c) {
        return '<button class="news-chip" data-cat="' + c + '">' + c + '</button>';
      }).join("");
      document.getElementById("newsFilters").addEventListener("click", function (e) {
        var b = e.target.closest("[data-cat]"); if (!b) return;
        active = b.getAttribute("data-cat");
        document.querySelectorAll("#newsFilters .news-chip").forEach(function (x) { x.classList.toggle("active", x === b); });
        render();
      });
      var first = document.querySelector("#newsFilters .news-chip"); if (first) first.classList.add("active");
      render();
      var y = document.getElementById("year"); if (y) y.textContent = new Date().getFullYear();
    })();
  </script>
</body>
</html>
